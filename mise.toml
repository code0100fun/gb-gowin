# ============================================================================
# Dependency installation
# ============================================================================

[tasks.deps]
description = "Install all dependencies"
depends = ["deps:pacman", "deps:pip", "deps:nextpnr"]

[tasks."deps:pacman"]
description = "Install official repo packages via pacman"
run = """
sudo pacman -S --needed yosys verilator openfpgaloader \
  cmake boost eigen python python-pip
"""

[tasks."deps:pip"]
description = "Install Python packages via pip"
run = """
pip install --break-system-packages apycula
"""

[tasks."deps:nextpnr"]
description = "Build and install nextpnr-himbaechel with Gowin backend from source"
depends = ["deps:pip"]
run = """
#!/usr/bin/env bash
set -e

NEXTPNR_DIR="$BUILD_DIR/deps/nextpnr"

if command -v nextpnr-himbaechel &>/dev/null; then
    echo "nextpnr-himbaechel already installed: $(nextpnr-himbaechel --version)"
    read -p "Rebuild and reinstall? [y/N] " answer
    [[ "$answer" =~ ^[Yy]$ ]] || exit 0
fi

mkdir -p "$BUILD_DIR/deps"

if [ -d "$NEXTPNR_DIR" ]; then
    echo "Updating existing nextpnr clone..."
    git -C "$NEXTPNR_DIR" pull
else
    echo "Cloning nextpnr..."
    git clone https://github.com/YosysHQ/nextpnr.git "$NEXTPNR_DIR"
fi

echo "Building nextpnr-himbaechel (Gowin only)..."
rm -rf "$NEXTPNR_DIR/build"
cmake -B "$NEXTPNR_DIR/build" -S "$NEXTPNR_DIR" \
    -DARCH=himbaechel -DHIMBAECHEL_UARCH=gowin
cmake --build "$NEXTPNR_DIR/build" -j$(nproc)

echo "Installing (requires sudo)..."
sudo cmake --install "$NEXTPNR_DIR/build"

echo "Done: $(nextpnr-himbaechel --version)"
"""

# ============================================================================
# Utility
# ============================================================================

[tasks.clean]
description = "Remove build artifacts"
run = """
rm -rf $BUILD_DIR
"""

[tasks.detect]
description = "Detect connected FPGA board"
run = """
openFPGALoader --detect
"""
