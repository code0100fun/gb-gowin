# Game Boy DMG — Tang Nano 20K
# Open-source toolchain: Yosys + nextpnr-himbaechel + Apicula + openFPGAloader

[tools]
python = "3.14"
zig = "0.15.2"

[env]
DEVICE = "GW2AR-LV18QN88C8/I7"
DEVICE_ALT = "GW2A-18C"
BOARD = "tangnano20k"
BUILD_DIR = "build"
CST = "rtl/platform/constraints.cst"

# ============================================================================
# Synthesis flow
# ============================================================================

[tasks.synth]
description = "Synthesize with Yosys (usage: mise run synth [top])"
run = """
#!/usr/bin/env bash
set -e
TOP="${1:-blinky}"
case "$TOP" in
    blinky)    SV_FILES="rtl/platform/blinky.sv" ;;
    gb_top)    SV_FILES="rtl/platform/gb_top.sv rtl/ppu/ppu.sv rtl/memory/dual_port_ram.sv rtl/memory/single_port_ram.sv rtl/lcd/st7789.sv rtl/io/timer.sv rtl/io/joypad.sv rtl/io/serial.sv rtl/cart/mbc1.sv rtl/io/uart_tx.sv rtl/io/uart_rx.sv rtl/io/debug_console.sv rtl/core/bus.sv rtl/core/cpu/cpu.sv rtl/core/cpu/regfile.sv rtl/core/cpu/alu.sv rtl/core/cpu/decoder.sv" ;;
    lcd_test_top) SV_FILES="rtl/platform/lcd_test_top.sv rtl/lcd/st7789.sv" ;;
    serial_test_top) SV_FILES="rtl/platform/serial_test_top.sv rtl/io/uart_tx.sv rtl/io/uart_rx.sv" ;;
    *)         echo "Unknown top module: $TOP (available: blinky, gb_top, lcd_test_top, serial_test_top)"; exit 1 ;;
esac
mkdir -p "$BUILD_DIR"
yosys -p "read_verilog -sv ${SV_FILES}; synth_gowin -top $TOP -json $BUILD_DIR/synth.json"
"""

[tasks.pnr]
description = "Place and route with nextpnr-himbaechel"
run = """
nextpnr-himbaechel --json $BUILD_DIR/synth.json --write $BUILD_DIR/pnr.json \
  --device $DEVICE --vopt family=$DEVICE_ALT --vopt cst=$CST
"""

[tasks.pack]
description = "Generate bitstream with gowin_pack"
run = """
gowin_pack -d $DEVICE_ALT -o $BUILD_DIR/gb.fs $BUILD_DIR/pnr.json
"""

[tasks.build]
description = "Full build: synth → pnr → pack (usage: mise run build [top])"
run = """
#!/usr/bin/env bash
set -e
mise run synth -- "${1:-blinky}"
mise run pnr
mise run pack
"""

[tasks.flash]
description = "Build and flash to Tang Nano 20K (usage: mise run flash [top])"
run = """
#!/usr/bin/env bash
set -e
mise run build -- "${1:-blinky}"
openFPGALoader -b "$BOARD" "$BUILD_DIR/gb.fs"
"""

