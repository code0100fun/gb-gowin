# Game Boy DMG — Tang Nano 20K
# Open-source toolchain: Yosys + nextpnr-himbaechel + Apicula + openFPGAloader

[tools]
python = "3.14"

[env]
DEVICE = "GW2AR-LV18QN88C8/I7"
DEVICE_ALT = "GW2A-18C"
BOARD = "tangnano20k"
TOP = "blinky"
BUILD_DIR = "build"
CST = "rtl/platform/constraints.cst"
SV_FILES = "rtl/platform/blinky.sv"

# ============================================================================
# Synthesis flow
# ============================================================================

[tasks.synth]
description = "Synthesize with Yosys"
run = """
mkdir -p $BUILD_DIR
yosys -p "read_verilog -sv ${SV_FILES}; synth_gowin -top $TOP -json $BUILD_DIR/synth.json"
"""

[tasks.pnr]
description = "Place and route with nextpnr-himbaechel"
depends = ["synth"]
run = """
nextpnr-himbaechel --json $BUILD_DIR/synth.json --write $BUILD_DIR/pnr.json \
  --device $DEVICE --vopt family=$DEVICE_ALT --vopt cst=$CST
"""

[tasks.pack]
description = "Generate bitstream with gowin_pack"
depends = ["pnr"]
run = """
gowin_pack -d $DEVICE_ALT -o $BUILD_DIR/gb.fs $BUILD_DIR/pnr.json
"""

[tasks.flash]
description = "Upload bitstream to Tang Nano 20K"
depends = ["pack"]
run = """
openFPGALoader -b $BOARD $BUILD_DIR/gb.fs
"""

[tasks.build]
description = "Full build: synth → pnr → pack"
depends = ["pack"]

# ============================================================================
# Simulation
# ============================================================================

[tasks.sim]
description = "Run all Verilator testbenches"
depends = ["sim:blinky", "sim:single_port_ram", "sim:dual_port_ram", "sim:rom", "sim:regfile", "sim:alu", "sim:decoder", "sim:cpu", "sim:bus", "sim:cpu_bus"]

[tasks."sim:blinky"]
description = "Run blinky testbench"
run = """
#!/usr/bin/env bash
set -e
verilator --cc --exe --build --trace \
    -Wall -Wno-UNUSEDSIGNAL \
    -CFLAGS "-I$(pwd)/sim/common" \
    -Mdir "$BUILD_DIR/sim/obj_blinky" \
    -o tb_blinky \
    rtl/platform/blinky.sv sim/tb/tb_blinky.cpp
"./$BUILD_DIR/sim/obj_blinky/tb_blinky"
"""

